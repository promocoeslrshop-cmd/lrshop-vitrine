<body>
  <div class="top-strip">🚨 OFERTAS SHOPEE MERCADOLIVRE AMAZON • ITENS LIMITADOS • ENTRE NOS GRUPOS PARA PEGAR PRIMEIRO</div>

  <div class="container">
    <header class="header">
  <div class="brand-wrap">
    <img src="/vitrine/logo-lrshop.png" alt="LR SHOP" class="brand-logo" />
  
  </div>

  <div class="header-actions">
    <div class="mini-counter">
      <span class="mini-counter-number" id="total-products">0</span>
      <span class="mini-counter-label">vendas</span>
    </div>

    <a class="top-btn telegram-btn" href="https://t.me/lrshop_promocoes" target="_blank" rel="noreferrer">
      📢 ENTRE NO GRUPO TELEGRAM
    </a>

    <a class="top-btn whatsapp-btn" href="SEU_LINK_DO_GRUPO_WHATSAPP_AQUI" target="_blank" rel="noreferrer">
      💬 ENTRE NO GRUPO WHATSAPP
    </a>
  </div>
</header>

   

    <section class="toolbar">
      <input id="search" class="input" type="text" placeholder="Buscar por título..." />
      <select id="category" class="select">
        <option value="Todos">Todos</option>
      </select>
    </section>

    <section id="status" class="status">Carregando ofertas...</section>
    <section id="highlight" class="highlight-wrap" style="display:none;"></section>
    <section id="grid" class="grid" style="display:none;"></section>

    <div id="loading-more" class="loading-more">Carregando mais ofertas...</div>

    <div id="load-more-wrap" class="load-more-wrap">
      <button id="load-more-btn" class="load-more-btn">Ver mais ofertas</button>
    </div>

    <div class="footer-note">
      As promoções podem mudar rápido. Entre nos grupos para receber antes.
    </div>
  </div>

  <script>
    const JSON_URL = "/vitrine/produtos.json";
    const CACHE_KEY = "lrshop_vitrine_cache_v6";
    const CACHE_TIME_KEY = "lrshop_vitrine_cache_time_v6";
    const CACHE_MAX_AGE_MS = 1000 * 60 * 15;
    const PAGE_SIZE = 24;

    const searchInput = document.getElementById("search");
    const categorySelect = document.getElementById("category");
    const statusEl = document.getElementById("status");
    const highlightEl = document.getElementById("highlight");
    const gridEl = document.getElementById("grid");
    const totalProductsEl = document.getElementById("total-products");
    const loadingMoreEl = document.getElementById("loading-more");
    const loadMoreWrapEl = document.getElementById("load-more-wrap");
    const loadMoreBtnEl = document.getElementById("load-more-btn");

    let products = [];
    let filteredProducts = [];
    let visibleCount = PAGE_SIZE;
    let renderTimer = null;
    let observer = null;
    let isLoadingMore = false;

    function formatCurrency(value) {
      const number = typeof value === "number"
        ? value
        : Number(String(value).replace(",", "."));

      if (Number.isNaN(number)) return value || "";

      return new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL"
      }).format(number);
    }

    function computeOldPrice(product) {
      if (product.precoOriginal && Number(product.precoOriginal) > Number(product.preco)) {
        return Number(product.precoOriginal);
      }

      const price = Number(product.preco || 0);
      if (!price) return null;

      if (price <= 20) return +(price * 2.35).toFixed(2);
      if (price <= 50) return +(price * 2.10).toFixed(2);
      if (price <= 100) return +(price * 1.90).toFixed(2);
      return +(price * 1.70).toFixed(2);
    }

    function computeDiscount(product, oldPrice) {
      if (product.desconto) return product.desconto;

      const price = Number(product.preco || 0);
      const old = Number(oldPrice || 0);

      if (!price || !old || old <= price) return "";

      const percent = Math.round((1 - (price / old)) * 100);
      return percent > 0 ? `${percent}% OFF` : "";
    }

    function badgeText(product, index) {
      if (index === 0) return "🔥 PROMOÇÃO HOJE";
      if ((product.score || 0) >= 90) return "💣 SUPER DESCONTO";
      if ((product.score || 0) >= 75) return "⚡ OFERTA QUENTE";
      return "🔥 OFERTA";
    }

    function rankText(index) {
      if (index === 0) return "TOP 1";
      if (index === 1) return "TOP 2";
      if (index === 2) return "TOP 3";
      return `TOP ${index + 1}`;
    }

    function buildCategories(items) {
      const currentValue = categorySelect.value || "Todos";

      const categories = ["Todos", ...new Set(
        items.map(p => p.categoria || "Ofertas").filter(Boolean)
      )];

      categorySelect.innerHTML = categories
        .map(c => `<option value="${c}">${c}</option>`)
        .join("");

      if (categories.includes(currentValue)) {
        categorySelect.value = currentValue;
      }
    }

    function buildHighlight(product) {
      const oldPrice = computeOldPrice(product);
      const discount = computeDiscount(product, oldPrice);
      const economia = oldPrice ? oldPrice - Number(product.preco || 0) : 0;

      highlightEl.innerHTML = `
        <article class="highlight-card">
          <div class="highlight-image">
            <img src="${product.imagem || ""}" alt="${product.titulo || ""}" loading="eager" decoding="async" />
            <div class="top-badge">🏆 PRODUTO DESTAQUE</div>
            <div class="flash-badge">${discount || "🔥 MELHOR OFERTA"}</div>
          </div>
          <div class="highlight-content">
            <div class="highlight-category">${product.categoria || "Ofertas"}</div>
            <div class="highlight-title">${product.titulo || ""}</div>
            <div class="highlight-text">
              Oferta selecionada automaticamente pelo robô para ficar no topo da vitrine.
              Preço forte, visual premium e foco total em conversão.
            </div>

            <div class="price-block">
              <div class="price-main">${formatCurrency(product.preco)}</div>
              ${oldPrice ? `<div class="price-old">${formatCurrency(oldPrice)}</div>` : ""}
            </div>

            ${economia > 0 ? `<div class="economy">💚 Você economiza ${formatCurrency(economia)}</div>` : ""}
            <div class="urgency-note">🚨 Oferta pode mudar sem aviso</div>

            <a class="highlight-btn" href="${product.link}" target="_blank" rel="noreferrer">
              🛒 VER OFERTA AGORA
            </a>
          </div>
        </article>
      `;
      highlightEl.style.display = "block";
    }

    function createCardHtml(product, index) {
      const oldPrice = computeOldPrice(product);
      const discount = computeDiscount(product, oldPrice);
      const economia = oldPrice ? oldPrice - Number(product.preco || 0) : 0;

      return `
        <article class="card">
          <div class="image-wrap">
            <img src="${product.imagem || ""}" alt="${product.titulo || ""}" loading="lazy" decoding="async" />
            ${discount ? `<div class="badge-left">${discount}</div>` : ""}
            <div class="badge-right">${badgeText(product, index + 1)}</div>
            <div class="rank-badge">${rankText(index + 1)}</div>
          </div>
          <div class="content">
            <div class="category">${product.categoria || "Ofertas"}</div>
            <div class="title">${product.titulo || ""}</div>
            <div class="price-row">
              <div class="price">${formatCurrency(product.preco)}</div>
              ${oldPrice ? `<div class="old-price">${formatCurrency(oldPrice)}</div>` : ""}
            </div>
            ${economia > 0 ? `<div class="mini-economy">💚 Economize ${formatCurrency(economia)}</div>` : ""}
            <div class="mini-urgency">⚠️ Clique e veja a oferta antes que mude</div>
            <a class="btn" href="${product.link}" target="_blank" rel="noreferrer">
              🔥 APROVEITAR DESCONTO
            </a>
          </div>
        </article>
      `;
    }

    function getFilteredProducts() {
      const search = searchInput.value.trim().toLowerCase();
      const category = categorySelect.value;

      return products.filter(product => {
        const title = (product.titulo || "").toLowerCase();
        const productCategory = product.categoria || "Ofertas";

        const matchesSearch = !search || title.includes(search);
        const matchesCategory = category === "Todos" || productCategory === category;

        return matchesSearch && matchesCategory;
      });
    }

    function updateLoadMoreState() {
      const restCount = Math.max(0, filteredProducts.length - 1);
      const hasMore = visibleCount < restCount;

      loadMoreWrapEl.style.display = hasMore ? "flex" : "none";
      loadingMoreEl.style.display = isLoadingMore ? "block" : "none";
    }

    function renderGridItems(items) {
      gridEl.innerHTML = items.map(createCardHtml).join("");
    }

    function render() {
      filteredProducts = getFilteredProducts();
      totalProductsEl.textContent = filteredProducts.length;

      if (!filteredProducts.length) {
        statusEl.style.display = "block";
        highlightEl.style.display = "none";
        gridEl.style.display = "none";
        loadMoreWrapEl.style.display = "none";
        loadingMoreEl.style.display = "none";
        statusEl.textContent = "Nenhum produto encontrado com esse filtro.";
        return;
      }

      statusEl.style.display = "none";

      const ordered = [...filteredProducts].sort((a, b) => {
        const scoreA = Number(a.score || 0);
        const scoreB = Number(b.score || 0);
        const priceA = Number(a.preco || 0);
        const priceB = Number(b.preco || 0);

        if (scoreB !== scoreA) return scoreB - scoreA;
        return priceA - priceB;
      });

      buildHighlight(ordered[0]);

      const rest = ordered.slice(1);
      const itemsToShow = rest.slice(0, visibleCount);

      if (!itemsToShow.length) {
        gridEl.style.display = "none";
      } else {
        gridEl.style.display = "grid";
        renderGridItems(itemsToShow);
      }

      updateLoadMoreState();
    }

    function resetPaginationAndRender() {
      visibleCount = PAGE_SIZE;
      render();
    }

    function scheduleRender() {
      if (renderTimer) clearTimeout(renderTimer);
      renderTimer = setTimeout(() => {
        resetPaginationAndRender();
      }, 120);
    }

    function loadMoreItems() {
      const restCount = Math.max(0, filteredProducts.length - 1);
      if (visibleCount >= restCount) return;

      isLoadingMore = true;
      updateLoadMoreState();

      requestAnimationFrame(() => {
        visibleCount += PAGE_SIZE;
        isLoadingMore = false;
        render();
      });
    }

    function setupInfiniteScroll() {
      if (observer) observer.disconnect();

      observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            loadMoreItems();
          }
        });
      }, {
        root: null,
        rootMargin: "300px 0px",
        threshold: 0
      });

      observer.observe(loadMoreWrapEl);
    }

    function saveCache(data) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        localStorage.setItem(CACHE_TIME_KEY, String(Date.now()));
      } catch {}
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        const cacheTime = Number(localStorage.getItem(CACHE_TIME_KEY) || 0);

        if (!raw) return null;
        if (!cacheTime) return null;

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return null;

        return {
          expired: (Date.now() - cacheTime) > CACHE_MAX_AGE_MS,
          data: parsed
        };
      } catch {
        return null;
      }
    }

    function applyProducts(data, fromCache = false) {
      products = Array.isArray(data) ? data : [];
      buildCategories(products);
      resetPaginationAndRender();

      if (fromCache) {
        statusEl.style.display = "block";
        statusEl.textContent = "Carregando atualização...";
      }
    }

    async function fetchLatestProducts() {
      const response = await fetch(`${JSON_URL}?v=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error("Falha ao carregar JSON");
      const data = await response.json();
      if (!Array.isArray(data)) throw new Error("JSON inválido");
      return data;
    }

    async function loadProducts() {
      try {
        const cache = loadCache();

        if (cache && cache.data.length) {
          applyProducts(cache.data, true);
        } else {
          statusEl.style.display = "block";
          highlightEl.style.display = "none";
          gridEl.style.display = "none";
          loadMoreWrapEl.style.display = "none";
          loadingMoreEl.style.display = "none";
          statusEl.textContent = "Carregando ofertas...";
        }

        const latest = await fetchLatestProducts();
        saveCache(latest);
        applyProducts(latest, false);
        statusEl.style.display = "none";
      } catch (err) {
        if (!products.length) {
          statusEl.style.display = "block";
          highlightEl.style.display = "none";
          gridEl.style.display = "none";
          loadMoreWrapEl.style.display = "none";
          loadingMoreEl.style.display = "none";
          statusEl.textContent = "Não foi possível carregar os produtos agora.";
        }
      }
    }

    searchInput.addEventListener("input", scheduleRender);
    categorySelect.addEventListener("change", resetPaginationAndRender);
    loadMoreBtnEl.addEventListener("click", loadMoreItems);

    setupInfiniteScroll();
    loadProducts();
    setInterval(loadProducts, 1000 * 60 * 5);
  </script>
</body>
</html>
